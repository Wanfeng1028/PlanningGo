/><text x="1235.0" y="74.0" class="body" text-anchor="middle" style="font-size:16px;font-weight:800;fill:#171717">免费注册</text><rect x="80" y="160" width="320" height="36" rx="18" fill="#FFFFFF" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="240.0" y="184" class="small" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#171717">Meituan Hackathon Demo · 企业级产品化方案</text><text x="80" y="260" class="h1" text-anchor="start" style="font-size:64px;font-weight:830;fill:#171717">把周末从“纠结”</text><text x="80" y="334" class="h1" text-anchor="start" style="font-size:64px;font-weight:830;fill:#171717">变成可以直接出发的计划</text><text x="84" y="390" class="body" text-anchor="start" style="font-size:18px;font-weight:600;fill:#6F6B64">输入一句话，系统自动理解同行人、预算、天气、距离、餐饮偏好和备选预案，</text><text x="84" y="418" class="body" text-anchor="start" style="font-size:18px;font-weight:600;fill:#6F6B64">给出可解释、可预订、可分享的本地生活周末方案。</text><rect x="82" y="476" width="176" height="54" rx="22" fill="#111214" stroke="none" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="170.0" y="509.0" class="body" text-anchor="middle" style="font-size:16px;font-weight:800;fill:#fff">先试试</text><rect x="276" y="476" width="206" height="54" rx="22" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="379.0" y="509.0" class="body" text-anchor="middle" style="font-size:16px;font-weight:800;fill:#171717">查看功能页卡</text><rect x="82" y="584" width="188" height="126" rx="24" fill="#FFFFFF" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="104" y="619" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#6F6B64">平均决策时间</text><text x="104" y="660" class="h2" text-anchor="start" style="font-size:34px;font-weight:800;fill:#171717">3 分钟</text><text x="104" y="687" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">从想法到路线</text><rect x="292" y="584" width="188" height="126" rx="24" fill="#FFFFFF" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="314" y="619" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#6F6B64">约束检查</text><text x="314" y="660" class="h2" text-anchor="start" style="font-size:34px;font-weight:800;fill:#171717">12 项</text><text x="314" y="687" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">天气/距离/预算/排队</text><rect x="502" y="584" width="188" height="126" rx="24" fill="#FFFFFF" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="524" y="619" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#6F6B64">备选方案</text><text x="524" y="660" class="h2" text-anchor="start" style="font-size:34px;font-weight:800;fill:#171717">3 套</text><text x="524" y="687" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">临时变化不慌</text><rect x="760" y="156" width="560" height="690" rx="36" fill="#FFFFFF" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><rect x="790" y="190" width="500" height="86" rx="28" fill="#111214" stroke="none" stroke-width="1" opacity="1" /><text x="820" y="242" class="h3" text-anchor="start" style="font-size:25px;font-weight:800;fill:#fff">今天想怎么过？</text><text x="820" y="272" class="small" text-anchor="start" style="font-size:13px;font-weight:600;fill:#D8D3CB">亲子 / 约会 / 朋友聚会 / 雨天室内</text><rect x="815" y="315" width="448" height="78" rx="22" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="842" y="350" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#171717">周六下午，想带爸妈在上海轻松逛逛，预算人均 200。</text><text x="842" y="374" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#171717">不要太累，晚饭要靠谱。</text><text x="815" y="440" class="h3" text-anchor="start" style="font-size:24px;font-weight:800;fill:#171717">首选方案：慢逛武康路 + 衡山坊晚餐</text><text x="815" y="474" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">可信度 92 · 步行少 · 晚餐可订 · 雨天可切换</text><circle cx="835" cy="540" r="11" fill="#FFD235" stroke="#111214" stroke-width="1" opacity="1"/><line x1="835" y1="554" x2="835" y2="592" stroke="#E8E1D6" stroke-width="2" opacity="1"/><text x="866" y="545" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#171717">14:00</text><text x="930" y="545" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">咖啡集合</text><circle cx="835" cy="610" r="11" fill="#DDEBFF" stroke="#111214" stroke-width="1" opacity="1"/><line x1="835" y1="624" x2="835" y2="662" stroke="#E8E1D6" stroke-width="2" opacity="1"/><text x="866" y="615" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#171717">15:10</text><text x="930" y="615" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">街区漫步</text><circle cx="835" cy="680" r="11" fill="#DEF7E8" stroke="#111214" stroke-width="1" opacity="1"/><line x1="835" y1="694" x2="835" y2="732" stroke="#E8E1D6" stroke-width="2" opacity="1"/><text x="866" y="685" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#171717">17:30</text><text x="930" y="685" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">预约晚餐</text><circle cx="835" cy="750" r="11" fill="#FFE3E8" stroke="#111214" stroke-width="1" opacity="1"/><text x="866" y="755" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#171717">19:30</text><text x="930" y="755" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">打车回家</text><rect x="1040" y="740" width="220" height="56" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" /><text x="1150" y="776" class="body" text-anchor="middle" style="font-size:16px;font-weight:800;fill:#171717">保存并发给家人</text><text x="80" y="930" class="tiny" text-anchor="start" style="