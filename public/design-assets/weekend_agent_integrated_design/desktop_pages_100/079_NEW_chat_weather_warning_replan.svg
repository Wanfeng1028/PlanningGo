oto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#111213" font-weight="700" text-anchor="middle" opacity="1" ><tspan x="1111" dy="0">个人中心</tspan></text><text x="1235" y="91" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#111213" font-weight="700" text-anchor="middle" opacity="1" ><tspan x="1235" dy="0">小明</tspan></text><rect x="1295" y="62" width="122" height="44" rx="22" fill="#FFCC33" stroke="none" stroke-width="1" opacity="1" filter="url(#smallShadow)"/><text x="1356" y="88.5" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#111213" font-weight="800" text-anchor="middle" opacity="1" ><tspan x="1356" dy="0">退出</tspan></text><text x="120" y="188" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="44" fill="#111213" font-weight="800" text-anchor="start" opacity="1" ><tspan x="120" dy="0">对话弹窗：天气风险提醒</tspan></text><text x="122" y="228" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#7A746B" font-weight="600" text-anchor="start" opacity="1" ><tspan x="122" dy="0">在生成前提示雨天风险和室内备选。</tspan></text><rect x="122" y="252" width="174" height="34" rx="17.0" fill="#111213" stroke="none" stroke-width="1" opacity="1" filter="url(#smallShadow)"/><text x="209.0" y="274.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#FFFDF8" font-weight="800" text-anchor="middle" opacity="1" ><tspan x="209.0" dy="0">079 · 新增扩展</tspan></text><rect x="120" y="302" width="1080" height="560" rx="34" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#softShadow)"/><rect x="144" y="330" width="1032" height="70" rx="24" fill="#111213" stroke="none" stroke-width="1" opacity="1"/><text x="178" y="374" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" fill="#FFFDF8" font-weight="800" text-anchor="start" opacity="1" ><tspan x="178" dy="0">对话式需求收集 · Agent 会逐步追问关键约束</tspan></text><rect x="620" y="430" width="520" height="58" rx="22" fill="#FFF2B8" stroke="#E8D9BA" stroke-width="1" opacity="1"/><text x="642" y="466" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#111213" font-weight="700" text-anchor="start" opacity="1" ><tspan x="642" dy="0">周六下午想带老婆孩子出去玩 4-6 小时，别离家太远。</tspan></text><text x="614" y="467" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#7A746B" font-weight="800" text-anchor="end" opacity="1" ><tspan x="614" dy="0">用户</tspan></text><rect x="174" y="512" width="520" height="58" rx="22" fill="#F3F7F7" stroke="#E8D9BA" stroke-width="1" opacity="1"/><text x="196" y="548" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#111213" font-weight="700" text-anchor="start" opacity="1" ><tspan x="196" dy="0">我先确认三个要点：孩子年龄、饮食目标、预算上限。</tspan></text><text x="700" y="549" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#7A746B" font-weight="800" text-anchor="start" opacity="1" ><tspan x="700" dy="0">Agent</tspan></text><rect x="620" y="594" width="520" height="58" rx="22" fill="#FFF2B8" stroke="#E8D9BA" stroke-width="1" opacity="1"/><text x="642" y="630" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#111213" font-weight="700" text-anchor="start" opacity="1" ><tspan x="642" dy="0">孩子 6 岁，老婆减脂，预算 800 以内。</tspan></text><text x="614" y="631" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#7A746B" font-weight="800" text-anchor="end" opacity="1" ><tspan x="614" dy="0">用户</tspan></text><rect x="174" y="676" width="520" height="58" rx="22" fill="#F3F7F7" stroke="#E8D9BA" stroke-width="1" opacity="1"/><text x="196" y="712" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#111213" font-weight="700" text-anchor="start" opacity="1" ><tspan x="196" dy="0">已生成 3 套候选路线，正在检查天气、停车和排队风险。</tspan></text><text x="700" y="713" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#7A746B" font-weight="800" text-anchor="start" opacity="1" ><tspan x="700" dy="0">Agent</tspan></text><rect x="174" y="758" width="930" height="72" rx="28" fill="#F9F4EA" stroke="#E8DCC9" stroke-width="1" opacity="1"/><text x="204" y="802" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="17" fill="#514D47" font-weight="700" text-anchor="start" opacity="1" ><tspan x="204" dy="0">输入框：继续补充“更想室内、要有停车、孩子想玩水”</tspan></text><rect x="204" y="694" width="118" height="34" rx="17.0" fill="#FFF7DB" stroke="#F0D584" stroke-width="1" opacity="1" filter="url(#smallShadow)"/><text x="263.0" y="716.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#6D4D00" font-weight="800" text-anchor="middle" opacity="1" ><tspan x="263.0" dy="0">室内优先</tspan></text><rect x="339" y="694" width="118" height="34" rx="17.0" fill="#FFF7DB" stroke="#F0D584" stroke-width="1" opacity="1" filter="url(#smallShadow)"/><text x="398.0" y="716.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#6D4D00" font-weight="800" text-anchor="middle" opacity="1" ><tspan x="398.0" dy="0">少走路</tspan></text><rect x="474" y="694" width="118" height="34" rx="17.0" fill="#FFF7DB" stroke="#F0D584" stroke-width="1" opacity="1" filter="url(#smallShadow)"/><text x="533.0" y="716.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#6D4D00" font-weight="800" text-anchor="middle" opacity="1" ><tspan x="533.0" dy="0">孩子友好</tspan></text><rect x="609" y="694" width="118" height="34" rx=