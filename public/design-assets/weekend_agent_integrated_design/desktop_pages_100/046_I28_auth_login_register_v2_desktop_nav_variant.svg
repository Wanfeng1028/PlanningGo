770" y="350" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#6F6B64">昵称</text><rect x="770" y="366" width="420" height="50" rx="17" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="792" y="399" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">周末观察员</text><text x="770" y="424" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#6F6B64">邮箱</text><rect x="770" y="440" width="420" height="50" rx="17" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="792" y="473" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">your@email.com</text><text x="770" y="498" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#6F6B64">密码</text><rect x="770" y="514" width="420" height="50" rx="17" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="792" y="547" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">至少 8 位字符</text><rect x="770" y="604" width="420" height="54" rx="18" fill="#111214" stroke="none" stroke-width="1" opacity="1" /><text x="980" y="640" class="body" text-anchor="middle" style="font-size:16px;font-weight:800;fill:#fff">创建账号</text><text x="770" y="696" class="small" text-anchor="start" style="font-size:13px;font-weight:600;fill:#6F6B64">注册即表示同意隐私条款；个人偏好可随时删除。</text></svg> <rect x="108" y="137" width="520" height="34" rx="17" fill="#111213" stroke="none" stroke-width="1" opacity="0.92" filter="url(#smallShadow)"/><text x="132" y="160" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFDF8" font-weight="800" text-anchor="start" opacity="1" ><tspan x="132" dy="0">046 · I28 差异版本保留 · 已重排为 D43 导航：登录注册合并原稿</tspan></text></svg>