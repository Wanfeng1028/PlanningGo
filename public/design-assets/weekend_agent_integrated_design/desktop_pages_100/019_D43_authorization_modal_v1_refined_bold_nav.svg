</text>
<text x="120" y="220" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="44" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="120" dy="0">执行授权弹窗</tspan>
</text>
<text x="122" y="260" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#6F6A62" font-weight="600" text-anchor="start" opacity="1">
<tspan x="122" dy="0">执行订座、购票、地图、日历、协作和配送前，必须逐项说明调用范围。</tspan>
</text>
<rect x="360" y="320" width="860" height="460" rx="30" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#softShadow)"/>
<text x="390" y="364" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="390" dy="0">授权周末有谱完成执行动作</tspan>
</text>
<text x="390" y="396" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#F59E0B" font-weight="800" text-anchor="start" opacity="1">
<tspan x="390" dy="0">付费动作需要再次确认，5 秒内可撤销</tspan>
</text>
<rect x="390" y="430" width="800" height="38" rx="16" fill="#F4EDE2" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
<text x="410" y="455" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="410" dy="0">美团账号：读取订单状态，用于订座和购票回填</tspan>
</text>
<rect x="390" y="484" width="800" height="38" rx="16" fill="#F4EDE2" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
<text x="410" y="509" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="410" dy="0">餐厅订座/排队：查询可预约时间并提交订位请求</tspan>
</text>
<rect x="390" y="538" width="800" height="38" rx="16" fill="#F4EDE2" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
<text x="410" y="563" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="410" dy="0">展览/乐园购票：查询余票，生成待支付订单</tspan>
</text>
<rect x="390" y="592" width="800" height="38" rx="16" fill="#F4EDE2" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
<text x="410" y="617" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="410" dy="0">地图导航：打开路线关键词，不读取无关位置历史</tspan>
</text>
<rect x="390" y="646" width="800" height="38" rx="16" fill="#F4EDE2" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
<text x="410" y="671" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="410" dy="0">日历 ICS：生成本地日历文件，不上传私人日历</tspan>
</text>
<rect x="390" y="700" width="800" height="38" rx="16" fill="#F4EDE2" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
<text x="410" y="725" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="410" dy="0">协作链接：邀请老婆/朋友查看、投票和建议修改</tspan>
</text>
<rect x="390" y="754" width="800" height="38" rx="16" fill="#F4EDE2" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
<text x="410" y="779" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="410" dy="0">配送到店：蛋糕/鲜花送达指定餐厅，付费前二次确认</tspan>
</text>
<rect x="390" y="718" width="90" height="40" rx="20.0" fill="#F4EDE2" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
<text x="435.0" y="741.5" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#111213" font-weight="800" text-anchor="middle" opacity="1">
<tspan x="435.0" dy="0">返回</tspan>
</text>
<rect x="492" y="718" width="90" height="40" rx="20.0" fill="#F4EDE2" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
<text x="537.0" y="741.5" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#F59E0B" font-weight="800" text-anchor="middle" opacity="1">
<tspan x="537.0" dy="0">跳过</tspan>
</text>
<rect x="594" y="718" width="596" height="40" rx="20.0" fill="#FFCC33" stroke="none" stroke-width="1" opacity="1" filter="url(#smallShadow)"/>
<text x="892.0" y="741.5" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#111213" font-weight="800" text-anchor="middle" opacity="1">
<tspan x="892.0" dy="0">同意授权并继续</tspan>
</text>
<rect x="1110" y="904" width="142" height="52" rx="26.0" fill="#F4EDE2" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
