nt-weight:600;fill:#D7D2C8">完成后首页会展示适合你的场景模板，结果页会优先满足硬约束。</text><rect x="470" y="230" width="780" height="620" rx="32" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="520" y="304" class="h2" text-anchor="start" style="font-size:38px;font-weight:800;fill:#171717">这次周末通常和谁一起？</text><text x="522" y="344" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#6F6B64">可多选，系统会自动调整步行距离、餐厅类型和活动密度。</text><rect x="522" y="392" width="72" height="38" rx="19" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="558.0" y="417" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">自己</text><rect x="606" y="392" width="72" height="38" rx="19" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="642.0" y="417" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">情侣</text><rect x="690" y="392" width="72" height="38" rx="19" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="726.0" y="417" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">朋友</text><rect x="774" y="392" width="72" height="38" rx="19" fill="#111214" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="810.0" y="417" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#fff">父母</text><rect x="858" y="392" width="72" height="38" rx="19" fill="#111214" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="894.0" y="417" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#fff">孩子</text><rect x="942" y="392" width="72" height="38" rx="19" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="978.0" y="417" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">宠物</text><text x="522" y="492" class="h3" text-anchor="start" style="font-size:24px;font-weight:800;fill:#171717">节奏偏好</text><rect x="522" y="52