size:15px;font-weight:800;fill:#171717">登录</text><rect x="1160" y="48" width="150" height="40" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="1235.0" y="74.0" class="body" text-anchor="middle" style="font-size:16px;font-weight:800;fill:#171717">免费注册</text><text x="80" y="158" class="h2" text-anchor="start" style="font-size:34px;font-weight:800;fill:#171717">功能页卡 · 先试试</text><text x="82" y="190" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">新用户不需要懂怎么提问，点一个卡片就能看到完整能力。</text><rect x="80" y="220" width="380" height="650" rx="34" fill="#111214" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="122" y="288" class="h2" text-anchor="start" style="font-size:33px;font-weight:800;fill:#fff">今天你想要哪种周末？</text><text x="124" y="326" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#D6D0C6">推荐模板会根据城市、天气和用户画像动态排序。</text><rect x="122" y="378" width="280" height="62" rx="20" fill="#1E2023" stroke="#343434" stroke-width="1" opacity="1" /><text x="148" y="405" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#fff">亲子不累</text><text x="148" y="428" class="tiny" text-anchor="start" style="font-size:11px;font-weight:600;fill:#AAA399">动物园 + 室内玩乐 + 亲子餐厅</text><rect x="122" y="462" width="280" height="62" rx="20" fill="#1E2023" stroke="#343434" stroke-width="1" opacity="1" /><text x="148" y="489" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#fff">情侣约会</text><text x="148" y="512" class="tiny" text-anchor="start" style="font-size:11px;font-weight:600;fill:#AAA399">展览 + 咖啡 + 晚餐 + 夜景</text><rect x="122" y="546" width="280" height="62" rx="20" fill="#1E2023" stroke="#343434" stroke-width="1" opacity="1" /><text x="148" y="573" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#fff">朋友聚会</text><text x="148" y="596" class="tiny" text-anchor="start" style="font-size:11px;font-weight:600;fill:#AAA399">密室/桌游 + 火锅 + 清吧</text><rect x="122" y="630" width="280" height="62" rx="20" fill="#1E2023" stroke="#343434" stroke-width="1" opacity="1" /><text x="148" y="657" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#fff">雨天室内</text><text x="148" y="680" class="tiny" text-anchor="start" style="font-size:11px;font-weight:600;fill:#AAA399">美术馆 + 商场 + 电影</text><rect x="122" y="714" width="280" height="62" rx="20" fill="#1E2023" stroke="#343434" stroke-width="1" opacity="1" /><text x="148" y="741" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#fff">爸妈来玩</text><text x="148" y="764" class="tiny" text-anchor="start" style="font-size:11px;font-weight:600;fill:#AAA399">少走路 + 老字号 + 公园</text><rect x="505" y="220" width="800" height="650" rx="34" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="552" y="288" class="h2" text-anchor="start" style="font-size:36px;font-weight:800;fill:#171717">功能矩阵</text><text x="552" y="326" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">每个功能都支持演示：输入、生成、解释、预订、分享、反馈。</text><rect x="552" y="370" width="328" height="82" rx="22" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><circle cx="586" cy="411" r="17" fill="#FFD235" stroke="none" stroke-width="1" opacity="1"/><text x="616" y="404" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">需求理解</text><text x="616" y="428" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">一句话提取时间/预算/同行人/偏好</text><rect x="922" y="370" width="328" height="82" rx="22" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><circle cx="956" cy="411" r="17" fill="#DDEBFF" stroke="none" stroke-width="1" opacity="1"/><text x="986" y="404" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">POI 召回</text><text x="986" y="428" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">餐饮/玩乐/景点/商圈/室内/亲子</text><rect x="552" y="478" width="328" height="82" rx="22" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><circle cx="586" cy="519" r="17" fill="#DEF7E8" stroke="none" stroke-width="1" opacity="1"/><text x="616" y="512" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">路线编排</text><text x="616" y="536" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">少绕路、少等待、节奏均衡</text><rect x="922" y="478" width="328" height="82" rx="22" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><circle cx="956" cy="519" r="17" fill="#FFD235" stroke="none" stroke-width="1" opacity="1"/><text x="986" y="512" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">预算优惠</text><text x="986" y="536" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">团购券、套餐、客单价预估</text><rect x="552" y="586" width="328" height="82" rx="22" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><circle cx="586" cy="627" r="17" fill="#DDEBFF" stroke="none" stroke-width="1" opacity="1"/><text x="616" y="620" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">风险兜底</text><text x="616" y="644" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">天气、人流、关店、排队、儿童友好</text><rect x="922" y="586" width="328" height="82" rx="22" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><circle cx="956" cy="627" r="17" fill="#DEF7E8" stroke="none" stroke-width="1" opacity="1"/><text x="986" y="620" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">协作投票</text><text x="986" y="644" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">家人朋友一起选，自动收敛</text><rect x="552" y="694" width="328" height="82" rx="22" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><circle cx="586" cy="735" r="17" fill="#FFD235" stroke="none" stroke-width="1" opacity="1"/><text x="616" y="728" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">日历提醒</text><text x="616" y="752" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">出发提醒、预订提醒、返程提醒</text><rect x="922" y="694" width="328" height="82" rx="22" fill="#F6F4F0" stroke="#E8E1D6" stroke-width="1" opacity="1" /><circle cx="956" cy="735" r="17" fill="#DDEBFF" stroke="none" stroke-width="1" opacity="1"/><text x="986" y="728" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#171717">质量反馈</text><text x="986" y="752" class="small" text-anchor="start" style="font-size:12px;font-weight:600;fill:#6F6B64">不喜欢原因回流到画像</text><rect x="1060" y="780" width="188" height="52" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="1154.0" y="812.0" class="body" text-anchor="middle" style="font-size:16px;font-weight:800;fill:#171717">从模板开始</text></svg> <rect x="108" y="137" width="520" height="34" rx="17" fill="#111213" stroke="none" stroke-width="1" opacity="0.92" filter="url(#smallShadow)"/><text x="132" y="160" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFDF8" font-weight="800" text-anchor="start" opacity="1" ><tspan x="132" dy="0">048 · I28 差异版本保留 · 已重排为 D43 导航：功能页卡 / 先试试</tspan></text></svg>