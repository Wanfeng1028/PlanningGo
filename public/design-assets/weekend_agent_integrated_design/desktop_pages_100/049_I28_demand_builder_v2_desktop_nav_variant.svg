" y="589" class="small" text-anchor="start" style="font-size:13px;font-weight:700;fill:#E5E0D6">总预算约 600</text><rect x="930" y="628" width="340" height="52" rx="18" fill="#1E2023" stroke="#343434" stroke-width="1" opacity="1" /><text x="954" y="661" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#FFD235">风险</text><text x="1030" y="661" class="small" text-anchor="start" style="font-size:13px;font-weight:700;fill:#E5E0D6">天气变化、餐厅排队、展览闭馆</text><rect x="930" y="700" width="340" height="52" rx="18" fill="#1E2023" stroke="#343434" stroke-width="1" opacity="1" /><text x="954" y="733" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#FFD235">输出</text><text x="1030" y="733" class="small" text-anchor="start" style="font-size:13px;font-weight:700;fill:#E5E0D6">主方案 + 雨天备选 + 省钱方案</text><rect x="1040" y="780" width="210" height="52" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="1145.0" y="812.0" class="body" text-anchor="middle" style="font-size:16px;font-weight:800;fill:#171717">生成 3 套方案</text></svg> <rect x="108" y="137" width="520" height="34" rx="17" fill="#111213" stroke="none" stroke-width="1" opacity="0.92" filter="url(#smallShadow)"/><text x="132" y="160" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFDF8" font-weight="800" text-anchor="start" opacity="1" ><tspan x="132" dy="0">049 · I28 差异版本保留 · 已重排为 D43 导航：需求构建器</tspan></text></svg>