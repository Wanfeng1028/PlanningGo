1214" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="342.0" y="605" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#fff">情侣</text><rect x="390" y="580" width="116" height="38" rx="19" fill="#111214" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="448.0" y="605" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#fff">人均 300</text><rect x="518" y="580" width="72" height="38" rx="19" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="554.0" y="605" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">少走路</text><rect x="602" y="580" width="86" height="38" rx="19" fill="#111214" stroke="#E8E1D6" stroke-width="1" opacity="1" /><text x="645.0" y="605" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#fff">雨天备选</text><text x="124" y="672" class="h3" text-anchor="start" style="font-size:24px;font-weight:800;fill:#171717">可调偏好</text><text x="130" y="734" class="body" text-anchor="start" style="font-size:16px;font-weight:800;fill:#171717">活动密度</text><rect x="260" y="710" width="300" height="36" rx="18" fill="#F1ECE3" stroke="#E8E1D6" stroke-width="1" opacity="1" /><rect x="260" y="710" width="150" height="36" rx="18" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" /><text x="590" y="734" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#6F6B64">适中</text><text x="130" y="792" class="body" text-anchor="start" style="font-size:16px;font-weight:800;fill:#171717">餐厅风格</text><rect x="260" y="768" width="300" height="36" rx="18" fill="#F1ECE3" stroke="#E8E1D6" stroke-width="1" opacity="1" /><rect x="260" y="768" width="188" height="36" rx="18" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" /><text x="590" y="792" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#6F6B64">有氛围</text><text x="130" y="850" class="body" text-anchor="start" style="font-size:1