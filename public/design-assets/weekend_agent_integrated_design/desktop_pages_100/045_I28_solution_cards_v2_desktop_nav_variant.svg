<rect x="0" y="0" width="1440" height="1000" rx="0" fill="#F7F4EC" stroke="none" stroke-width="1" opacity="1" /><circle cx="1220" cy="132" r="230" fill="#FFE781" stroke="none" stroke-width="1" opacity="0.32"/><circle cx="150" cy="840" r="260" fill="#DDEBFF" stroke="none" stroke-width="1" opacity="0.38"/><rect x="64" y="32" width="1312" height="72" rx="28" fill="rgba(255,255,255,0.78)" stroke="#EAE2D5" stroke-width="1" opacity="0.96" filter="url(#softShadow)"/><circle cx="94" cy="68" r="16" fill="#FFD235" stroke="none" stroke-width="1" opacity="1"/><circle cx="104" cy="62" r="5" fill="#111214" stroke="none" stroke-width="1" opacity="1"/><text x="120" y="75" class="nav" text-anchor="start" style="font-size:18px;font-weight:800;fill:#171717">周末有谱</text><rect x="312" y="48" width="92" height="40" rx="20" fill="transparent" stroke="none" stroke-width="1" opacity="0.96" /><text x="348" y="74" class="nav" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#171717">首页</text><rect x="420" y="48" width="110" height="40" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="0.96" /><text x="466" y="74" class="nav" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#171717">功能页卡</text><rect x="550" y="48" width="92" height="40" rx="20" fill="transparent" stroke="none" stroke-width="1" opacity="0.96" /><text x="586" y="74" class="nav" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#171717">场景案例</text><rect x="658" y="48" width="92" height="40" rx="20" fill="transparent" stroke="none" stroke-width="1" opacity="0.96" /><text x="694" y="74" class="nav" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#171717">设计亮点</text><rect x="766" y="48" width="92" height="40" rx="20" fill="transparent" stroke="none" stroke-width="1" opacity="0.96" /><text x="802" y="74" class="nav" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#171717">开发者</text><text x="1090" y="74" class="nav" text-anchor="start" style="font-size:15px;font-weight:800;fill:#171717">登录</text><rect x="1160" y="48" width="150" height="40" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="1235.0" y="74.0" class="body" text-anchor="middle" style="font-size:16px;font-weight:800;fill:#171717">免费注册</text><text x="80" y="158" class="h2" text-anchor="start" style="font-size:34px;font-weight:800;fill:#171717">功能页卡</text><text x="82" y="190" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">让评委一眼看到：这不是聊天玩具，而是完整的本地生活决策系统。</text><rect x="82" y="250" width="382" height="228" rx="30" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><circle cx="130" cy="300" r="24" fill="#FFD235" stroke="none" stroke-width="1" opacity="1"/><text x="166" y="308" class="h3" text-anchor="start" style="font-size:23px;font-weight:800;fill:#171717">一句话生成周末计划</text><text x="114" y="358" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">自然语言 + 结构化约束，自动拆成时间、地点、预算、</text><text x="114" y="384" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">同行人、禁忌项。</text><text x="114" y="410" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64"></text><rect x="114" y="424" width="126" height="38" rx="19" fill="#111214" stroke="none" stroke-width="1" opacity="1" /><text x="177" y="449" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#fff">开始体验</text><rect x="508" y="250" width="382" height="228" rx="30" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><circle cx="556" cy="300" r="24" fill="#DDEBFF" stroke="none" stroke-width="1" opacity="1"/><text x="592" y="308" class="h3" text-anchor="start" style="font-size:23px;font-weight:800;fill:#171717">多方案对比</text><text x="540" y="358" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">首选 / 省钱 / 松弛 / 雨天 / 亲子五类方案</text><text x="540" y="384" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">同屏对比，解释取舍。</text><text x="540" y="410" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64"></text><rect x="540" y="424" width="126" height="38" rx="19" fill="#F6F4F0" stroke="none" stroke-width="1" opacity="1" /><text x="603" y="449" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">比较方案</text><rect x="934" y="250" width="382" height="228" rx="30" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><circle cx="982" cy="300" r="24" fill="#DEF7E8" stroke="none" stroke-width="1" opacity="1"/><text x="1018" y="308" class="h3" text-anchor="start" style="font-size:23px;font-weight:800;fill:#171717">真实履约闭环</text><text x="966" y="358" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">餐厅预订、团购券、导航、日历、分享投票、变更预案串成</text><text x="966" y="384" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">一个流程。</text><text x="966" y="410" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64"></text><rect x="966" y="424" width="126" height="38" rx="19" fill="#F6F4F0" stroke="none" stroke-width="1" opacity="1" /><text x="1029" y="449" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">查看闭环</text><rect x="82" y="518" width="382" height="228" rx="30" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><circle cx="130" cy="568" r="24" fill="#FFE3E8" stroke="none" stroke-width="1" opacity="1"/><text x="166" y="576" class="h3" text-anchor="start" style="font-size:23px;font-weight:800;fill:#171717">个人偏好中心</text><text x="114" y="626" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">常住地址、家庭成员、饮食忌口、出行半径、预算档位、历</text><text x="114" y="652" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">史收藏。</text><text x="114" y="678" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64"></text><rect x="114" y="692" width="126" height="38" rx="19" fill="#F6F4F0" stroke="none" stroke-width="1" opacity="1" /><text x="177" y="717" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">完善画像</text><rect x="508" y="518" width="382" height="228" rx="30" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><circle cx="556" cy="568" r="24" fill="#F1ECE3" stroke="none" stroke-width="1" opacity="1"/><text x="592" y="576" class="h3" text-anchor="start" style="font-size:23px;font-weight:800;fill:#171717">质量与风控后台</text><text x="540" y="626" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">数据源健康、推荐质量、投诉反馈、A/B 实验、召回失</text><text x="540" y="652" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">败兜底。</text><text x="540" y="678" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64"></text><rect x="540" y="692" width="126" height="38" rx="19" fill="#F6F4F0" stroke="none" stroke-width="1" opacity="1" /><text x="603" y="717" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">运营监控</text><rect x="934" y="518" width="382" height="228" rx="30" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><circle cx="982" cy="568" r="24" fill="#FFE781" stroke="none" stroke-width="1" opacity="1"/><text x="1018" y="576" class="h3" text-anchor="start" style="font-size:23px;font-weight:800;fill:#171717">开发者接入</text><text x="966" y="626" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">地点/评价/库存/天气/交通 API 抽象，方便接入</text><text x="966" y="652" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">真实数据。</text><text x="966" y="678" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64"></text><rect x="966" y="692" width="126" height="38" rx="19" fill="#F6F4F0" stroke="none" stroke-width="1" opacity="1" /><text x="1029" y="717" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">看接口</text><rect x="82" y="810" width="1276" height="104" rx="32" fill="#111214" stroke="none" stroke-width="1" opacity="1" /><text x="124" y="865" class="h3" text-anchor="start" style="font-size:26px;font-weight:800;fill:#fff">企业级感的关键：功能卡不是装饰，而是进入真实业务流程的入口。</text><text x="124" y="895" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#D7D2C8">每张卡都能点击进入功能页、演示页或配置页，答辩时可以顺着卡片讲完整链路。</text></svg> <rect x="108" y="137" width="520" height="34" rx="17" fill="#111213" stroke="none" stroke-width="1" opacity="0.92" filter="url(#smallShadow)"/><text x="132" y="160" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFDF8" font-weight="800" text-anchor="start" opacity="1" ><tspan x="132" dy="0">045 · I28 差异版本保留 · 已重排为 D43 导航：方案卡片页</tspan></text></svg>