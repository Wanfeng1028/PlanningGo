<rect x="0" y="0" width="1440" height="1000" rx="0" fill="url(#heroGrad)" stroke="none" stroke-width="1" opacity="1" /><rect x="64" y="32" width="1312" height="72" rx="28" fill="rgba(255,255,255,0.78)" stroke="#EAE2D5" stroke-width="1" opacity="0.96" filter="url(#softShadow)"/><circle cx="94" cy="68" r="16" fill="#FFD235" stroke="none" stroke-width="1" opacity="1"/><circle cx="104" cy="62" r="5" fill="#111214" stroke="none" stroke-width="1" opacity="1"/><text x="120" y="75" class="nav" text-anchor="start" style="font-size:18px;font-weight:800;fill:#171717">周末有谱</text><rect x="312" y="48" width="92" height="40" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="0.96" /><text x="348" y="74" class="nav" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#171717">首页</text><rect x="420" y="48" width="110" height="40" rx="20" fill="transparent" stroke="none" stroke-width="1" opacity="0.96" /><text x="466" y="74" class="nav" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#171717">功能页卡</text><rect x="550" y="48" width="92" height="40" rx="20" fill="transparent" stroke="none" stroke-width="1" opacity="0.96" /><text x="586" y="74" class="nav" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#171717">场景案例</text><rect x="658" y="48" width="92" height="40" rx="20" fill="transparent" stroke="none" stroke-width="1" opacity="0.96" /><text x="694" y="74" class="nav" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#171717">设计亮点</text><rect x="766" y="48" width="92" height="40" rx="20" fill="transparent" stroke="none" stroke-width="1" opacity="0.96" /><text x="802" y="74" class="nav" text-anchor="middle" style="font-size:15px;font-weight:800;fill:#171717">开发者</text><text x="1090" y="74" class="nav" text-anchor="start" style="font-size:15px;font-weight:800;fill:#171717">登录</text><rect x="1160" y="48" width="150" height="40" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="1235.0" y="74.0" class="body" text-anchor="middle" style="font-size:16px;font-weight:800;fill:#171717">免费注册</text><text x="80" y="164" class="h2" text-anchor="start" style="font-size:36px;font-weight:820;fill:#171717">官网长页 · 产品叙事区</text><text x="82" y="198" class="body" text-anchor="start" style="font-size:15px;font-weight:600;fill:#6F6B64">首页不是一张海报，而是能把价值、场景、信任、履约闭环讲清楚的完整官网。</text><rect x="80" y="250" width="580" height="210" rx="32" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="116" y="306" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#246BFE">01 价值主张</text><text x="116" y="348" class="h3" text-anchor="start" style="font-size:26px;font-weight:820;fill:#171717">一句话生成可执行周末计划</text><text x="116" y="382" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#6F6B64">把“想去哪”转换为“几点出发、去哪、怎么订、怎么</text><text x="116" y="410" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#6F6B64">备选”。</text><rect x="476" y="384" width="118" height="44" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" /><text x="535" y="413" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">了解更多</text><rect x="720" y="250" width="580" height="210" rx="32" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="756" y="306" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#246BFE">02 场景入口</text><text x="756" y="348" class="h3" text-anchor="start" style="font-size:26px;font-weight:820;fill:#171717">亲子、约会、朋友、爸妈、雨天</text><text x="756" y="382" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#6F6B64">用户先点模板，不会提问也能试。</text><text x="756" y="410" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#6F6B64"></text><rect x="1116" y="384" width="118" height="44" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" /><text x="1175" y="413" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">了解更多</text><rect x="80" y="510" width="580" height="210" rx="32" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="116" y="566" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#246BFE">03 可信证据</text><text x="116" y="608" class="h3" text-anchor="start" style="font-size:26px;font-weight:820;fill:#171717">约束解释、评分来源、风险兜底</text><text x="116" y="642" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#6F6B64">避免 AI 黑盒感，让用户知道为什么推荐。</text><text x="116" y="670" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#6F6B64"></text><rect x="476" y="644" width="118" height="44" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" /><text x="535" y="673" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">了解更多</text><rect x="720" y="510" width="580" height="210" rx="32" fill="#fff" stroke="#E8E1D6" stroke-width="1" opacity="1" filter="url(#softShadow)"/><text x="756" y="566" class="small" text-anchor="start" style="font-size:13px;font-weight:800;fill:#246BFE">04 履约闭环</text><text x="756" y="608" class="h3" text-anchor="start" style="font-size:26px;font-weight:820;fill:#171717">购票、订座、导航、日历、分享</text><text x="756" y="642" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#6F6B64">不是只给建议，而是推进到真实动作。</text><text x="756" y="670" class="body" text-anchor="start" style="font-size:16px;font-weight:600;fill:#6F6B64"></text><rect x="1116" y="644" width="118" height="44" rx="20" fill="#FFD235" stroke="none" stroke-width="1" opacity="1" /><text x="1175" y="673" class="small" text-anchor="middle" style="font-size:13px;font-weight:800;fill:#171717">了解更多</text><rect x="80" y="812" width="1220" height="86" rx="30" fill="#111214" stroke="none" stroke-width="1" opacity="1" /><text x="126" y="862" class="body" text-anchor="start" style="font-size:17px;font-weight:800;fill:#fff">官网顶部导航：左侧品牌，中间首页/功能页卡/场景案例/设计亮点/开发者，右侧登录/免费注册。</text></svg> <rect x="108" y="137" width="520" height="34" rx="17" fill="#111213" stroke="none" stroke-width="1" opacity="0.92" filter="url(#smallShadow)"/><text x="132" y="160" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#FFFDF8" font-weight="800" text-anchor="start" opacity="1" ><tspan x="132" dy="0">062 · I28 差异版本保留 · 已重排为 D43 导航：营销长页</tspan></text></svg>