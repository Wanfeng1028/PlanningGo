</text>
<rect x="1334" y="72" width="112" height="44" rx="22.0" fill="#151515" stroke="none" stroke-width="1" opacity="1"/>
<text x="1390.0" y="98.5" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="15" fill="#FFFFFF" font-weight="800" text-anchor="middle" opacity="1">
