</text>
<text x="120" y="210" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="40" fill="#111213" font-weight="900" text-anchor="start" opacity="1">
<tspan x="120" dy="0">餐厅可订库存检查</tspan>
</text>
<text x="122" y="255" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="16" fill="#6F6A62" font-weight="700" text-anchor="start" opacity="1">
<tspan x="122" dy="0">查适合多人/亲子/减脂的餐厅，有没有位置、是否要排队。</tspan>
</text>
<rect x="120" y="330" width="405" height="210" rx="24" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#softShadow)"/>
<rect x="142" y="352" width="84" height="30" rx="15.0" fill="#FFCC33" stroke="none" stroke-width="1" opacity="1" filter="url(#smallShadow)"/>
<text x="184.0" y="370.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="12" fill="#111213" font-weight="800" text-anchor="middle" opacity="1">
<tspan x="184.0" dy="0">定位</tspan>
</text>
<text x="142" y="392" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="22" fill="#111213" font-weight="900" text-anchor="start" opacity="1">
<tspan x="142" dy="0">先确定用户在哪里</tspan>
</text>
<text x="142" y="430" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="14" fill="#6F6A62" font-weight="700" text-anchor="start" opacity="1">
<tspan x="142" dy="0">“别离家太远”必须依赖定位或手动起点，本次示例</tspan>
<tspan x="142" dy="22">为浙大紫金港。</tspan>
</text>
<rect x="560" y="330" width="405" height="210" rx="24" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#softShadow)"/>
<rect x="582" y="352" width="84" height="30" rx="15.0" fill="#FFCC33" stroke="none" stroke-width="1" opacity="1" filter="url(#smallShadow)"/>
<text x="624.0" y="370.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="12" fill="#111213" font-weight="800" text-anchor="middle" opacity="1">
<tspan x="624.0" dy="0">规划</tspan>
</text>
<text x="582" y="392" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="22" fill="#111213" font-weight="900" text-anchor="start" opacity="1">
<tspan x="582" dy="0">生成 3 套下午方案</tspan>
</text>
<text x="582" y="430" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="14" fill="#6F6A62" font-weight="700" text-anchor="start" opacity="1">
<tspan x="582" dy="0">亲子低负担、朋友轻社交、雨天室内，各自有时间线</tspan>
<tspan x="582" dy="22">和风险。</tspan>
</text>
<rect x="1000" y="330" width="405" height="210" rx="24" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#softShadow)"/>
<rect x="1022" y="352" width="84" height="30" rx="15.0" fill="#FFCC33" stroke="none" stroke-width="1" opacity="1" filter="url(#smallShadow)"/>
<text x="1064.0" y="370.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="12" fill="#111213" font-weight="800" text-anchor="middle" opacity="1">
<tspan x="1064.0" dy="0">执行</tspan>
</text>
<text x="1022" y="392" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="22" fill="#111213" font-weight="900" text-anchor="start" opacity="1">
<tspan x="1022" dy="0">预约/锁单/分享</tspan>
</text>
<text x="1022" y="430" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="14" fill="#6F6A62" font-weight="700" text-anchor="start" opacity="1">
<tspan x="1022" dy="0">确认后 Agent 安排餐厅、票务、日历、导航，支付由</tspan>
<tspan x="1022" dy="22">用户本人完成。</tspan>
</text>
<rect x="120" y="575" width="405" height="210" rx="24" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#softShadow)"/>
<rect x="142" y="597" width="84" height="30" rx="15.0" fill="#FFCC33" stroke="none" stroke-width="1" opacity="1" filter="url(#smallShadow)"/>
<text x="184.0" y="615.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="12" fill="#111213" font-weight="800" text-anchor="middle" opacity="1">
<tspan x="184.0" dy="0">协作</tspan>
</text>
<text x="142" y="637" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="22" fill="#111213" font-weight="900" text-anchor="start" opacity="1">
<tspan x="142" dy="0">递给老婆 / 发给朋友</tspan>
</text>
<text x="142" y="675" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="14" fill="#6F6A62" font-weight="700" text-anchor="start" opacity="1">
<tspan x="142" dy="0">家人确认、朋友投票，反馈会触发方案微调。</tspan>
</text>
<rect x="560" y="575" width="405" height="210" rx="24" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#softShadow)"/>
<rect x="582" y="597" width="84" height="30" rx="15.0" fill="#FFCC33" stroke="none" stroke-width="1" opacity="1" filter="url(#smallShadow)"/>
<text x="624.0" y="615.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="12" fill="#111213" font-weight="800" text-anchor="middle" opacity="1">
<tspan x="624.0" dy="0">记忆</tspan>
</text>
<text x="582" y="637" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="22" fill="#111213" font-weight="900" text-anchor="start" opacity="1">
<tspan x="582" dy="0">把偏好沉淀下来</tspan>
</text>
<text x="582" y="675" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="14" fill="#6F6A62" font-weight="700" text-anchor="start" opacity="1">
<tspan x="582" dy="0">下次少问，自动避开排队和高负担路线。</tspan>
</text>
<rect x="1000" y="575" width="405" height="210" rx="24" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#softShadow)"/>
<rect x="1022" y="597" width="84" height="30" rx="15.0" fill="#FFCC33" stroke="none" stroke-width="1" opacity="1" filter="url(#smallShadow)"/>
<text x="1064.0" y="615.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="12" fill="#111213" font-weight="800" text-anchor="middle" opacity="1">
<tspan x="1064.0" dy="0">兜底</tspan>
</text>
<text x="1022" y="637" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="22" fill="#111213" font-weight="900" text-anchor="start" opacity="1">
<tspan x="1022" dy="0">失败也能继续走</tspan>
</text>
<text x="1022" y="675" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="14" fill="#6F6A62" font-weight="700" text-anchor="start" opacity="1">
<tspan x="1022" dy="0">天气、排队、预算冲突、工具失败都有替代方案。</tspan>
</text>
<rect x="690" y="930" width="220" height="34" rx="17.0" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#smallShadow)"/>
<text x="800.0" y="950.0" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="12" fill="#6F6A62" font-weight="800" text-anchor="middle" opacity="1">
<tspan x="800.0" dy="0">024 / 100 · 功能页卡</tspan>
</text>
