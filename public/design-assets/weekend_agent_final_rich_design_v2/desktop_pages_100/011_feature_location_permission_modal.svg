<tspan x="146" dy="0">功能页卡：从一句话开始</tspan>
</text>
<text x="146" y="388" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="14" fill="#6F6A62" font-weight="700" text-anchor="start" opacity="1">
<tspan x="146" dy="0">用户点击“帮我安排”后，系统需要在合适时机请求授权，才能确定起点与距离。</tspan>
</text>
<rect x="210" y="420" width="560" height="260" rx="28" fill="#F4EBDD" stroke="#E7DDCE" stroke-width="1" opacity="1"/>
<text x="240" y="465" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="22" fill="#111213" font-weight="900" text-anchor="start" opacity="1">
<tspan x="240" dy="0">小明发来的消息</tspan>
</text>
<text x="240" y="510" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="18" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="240" dy="0">今天下午是空的，想和老婆孩子/朋友出去</tspan>
<tspan x="240" dy="28">玩几个小时，别离家太远，帮我安排一下。</tspan>
</text>
<rect x="240" y="610" width="180" height="42" rx="21.0" fill="#FFCC33" stroke="none" stroke-width="1" opacity="1" filter="url(#smallShadow)"/>
