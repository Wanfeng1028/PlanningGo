<text x="120" y="210" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="40" fill="#111213" font-weight="900" text-anchor="start" opacity="1">
<tspan x="120" dy="0">定位授权弹窗</tspan>
</text>
<text x="122" y="255" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="16" fill="#6F6A62" font-weight="700" text-anchor="start" opacity="1">
<tspan x="122" dy="0">新增：规划“别离家太远”前必须先确认定位或手动起点。</tspan>
</text>
<rect x="120" y="310" width="1320" height="560" rx="28" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#softShadow)"/>
