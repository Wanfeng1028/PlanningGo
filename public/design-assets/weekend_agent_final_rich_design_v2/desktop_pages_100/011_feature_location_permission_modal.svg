<tspan x="330.0" dy="0">开始规划</tspan>
</text>
<rect x="826" y="355" width="470" height="390" rx="34" fill="#FFFDF8" stroke="#E7DDCE" stroke-width="1" opacity="1" filter="url(#softShadow)"/>
<circle cx="878" cy="420" r="28" fill="#FFCC33" stroke="none" stroke-width="1" opacity="1"/>
<text x="922" y="414" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="26" fill="#111213" font-weight="900" text-anchor="start" opacity="1">
<tspan x="922" dy="0">允许周末有谱使用定位？</tspan>
</text>
<text x="922" y="465" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="15" fill="#6F6A62" font-weight="800" text-anchor="start" opacity="1">
<tspan x="922" dy="0">用于判断“别离家太远”的真实含义，并</tspan>
<tspan x="922" dy="23">计算从浙大紫金港到西湖、餐厅、活动点</tspan>
<tspan x="922" dy="23">的时间。</tspan>
</text>
<circle cx="860" cy="530" r="6" fill="#27AE60" stroke="none" stroke-width="1" opacity="1"/>
<text x="878" y="535" font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, Hiragino Sans GB, Arial, sans-serif" font-size="15" fill="#111213" font-weight="800" text-anchor="start" opacity="1">
<tspan x="878" dy="0">仅本次规划使用</tspan>
</text>
